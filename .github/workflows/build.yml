name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install stripe fastapi uvicorn pyyaml pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --noconfirm app.py
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: dist/app.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

